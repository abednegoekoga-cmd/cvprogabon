<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Pro Gabon</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .price {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
            margin: 15px 0;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            width: 100%;
        }
        button:hover {
            background: #764ba2;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 768px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 CV Pro Gabon</h1>
            <p>Générez des CVs professionnels</p>
        </div>

        <div id="pricing" class="cards">
            <div class="card">
                <h2>📋 Free</h2>
                <div class="price">0 FCFA</div>
                <p>✓ Modèle basique<br>✓ Export PDF<br>⚠️ Watermark</p>
                <button onclick="startApp('free')">Choisir</button>
            </div>

            <div class="card">
                <h2>⭐ Premium</h2>
                <div class="price">2 000 FCFA</div>
                <p>✓ 3 modèles exclusifs<br>✓ Sans watermark<br>✓ Qualité HD</p>
                <button onclick="startApp('premium')">Choisir</button>
            </div>
        </div>

        <div id="app" class="hidden">
            <div class="card">
                <h1 id="planTitle"></h1>
                <form onsubmit="handleSubmit(event)">
                    <div style="text-align: left; margin-bottom: 20px;">
                        <label>Nom Complet:</label><br>
                        <input type="text" id="fullName" required style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px;">

                        <label>Poste:</label><br>
                        <input type="text" id="position" required style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px;">

                        <label>Email:</label><br>
                        <input type="email" id="email" style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px;">

                        <label>Téléphone:</label><br>
                        <input type="tel" id="phone" style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px;">
                    </div>

                    <div id="paymentBox" class="hidden" style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                        <h3>💳 Paiement: 2 000 FCFA</h3>
                        <p><strong>📱 Airtel Money:</strong> 077 31 51 01<br>
                        <strong>📱 Moov Money:</strong> 062 16 97 12</p>
                        <label>Code de vérification:</label><br>
                        <input type="text" id="code" maxlength="6" placeholder="000000" style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 1.2em; text-align: center; letter-spacing: 3px;">
                        <button type="button" onclick="verifyCode()" style="margin-top: 10px;">Vérifier</button>
                        <div id="message" style="margin-top: 10px;"></div>
                    </div>

                    <button type="submit">Générer CV</button>
                </form>

                <div id="preview" class="hidden" style="margin-top: 30px; background: white; padding: 30px; border-radius: 8px; text-align: left;">
                    <h2 id="previewName"></h2>
                    <p id="previewPosition" style="color: #667eea; font-weight: bold;"></p>
                    <p id="previewContact"></p>
                    <hr>
                    <p id="previewContent"></p>
                    <button type="button" onclick="downloadPDF()" style="margin-top: 20px;">📥 Télécharger PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        let currentPlan = null;

        function startApp(plan) {
            currentPlan = plan;
            document.getElementById('pricing').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('planTitle').textContent = plan === 'free' ? '📋 Plan Free' : '⭐ Plan Premium';
            
            if (plan === 'premium') {
                document.getElementById('paymentBox').classList.remove('hidden');
            }
        }

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return Math.abs(hash).toString().slice(0, 6).padStart(6, '0');
        }

        function verifyCode() {
            const fullName = document.getElementById('fullName').value;
            const position = document.getElementById('position').value;
            const code = document.getElementById('code').value;
            const expected = hashCode(fullName + position);

            const msgDiv = document.getElementById('message');
            if (code === expected) {
                msgDiv.innerHTML = '<span style="color: green; font-weight: bold;">✅ Code valide !</span>';
                document.getElementById('paymentBox').style.display = 'none';
            } else {
                msgDiv.innerHTML = '<span style="color: red; font-weight: bold;">❌ Code invalide !</span>';
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const position = document.getElementById('position').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            document.getElementById('previewName').textContent = fullName;
            document.getElementById('previewPosition').textContent = position;
            document.getElementById('previewContact').textContent = email + ' | ' + phone;
            document.getElementById('previewContent').textContent = 'Contenu du CV généré avec succès!';

            if (currentPlan === 'free') {
                document.getElementById('preview').classList.remove('hidden');
            } else {
                const code = document.getElementById('code').value;
                const expected = hashCode(fullName + position);
                if (code === expected) {
                    document.getElementById('preview').classList.remove('hidden');
                } else {
                    alert('Veuillez vérifier votre code!');
                }
            }
        }

        function downloadPDF() {
            const element = document.getElementById('preview');
            const opt = {
                margin: 10,
                filename: document.getElementById('fullName').value + '_CV.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="description" content="Créez un CV professionnel en 5 minutes et augmentez vos chances d'obtenir un emploi au Gabon."/>
<title>CV Pro Gabon ✨ — CV Professionnel en 5 minutes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f1923;font-family:'Segoe UI',system-ui,sans-serif;color:#e8edf2;}
input,select,textarea{color:#e8edf2!important;}
input::placeholder,textarea::placeholder{color:#546e7a!important;}
select option{background:#1a2f45;color:#e8edf2;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.fade{animation:fade 0.3s ease;}
.pulse{animation:pulse 2s infinite;}

/* CV Gratuit - Basique noir et blanc */
.cv-gratuit{font-family:'Georgia',serif;color:#1a1a2e;line-height:1.6;position:relative;}
.cv-gratuit h1{font-size:20px;color:#333;border-bottom:2px solid #999;padding-bottom:6px;margin-bottom:4px;}
.cv-gratuit .subtitle{font-size:13px;color:#666;font-style:italic;margin-bottom:10px;}
.cv-gratuit .contact-line{font-size:12px;color:#666;margin-bottom:3px;}
.cv-gratuit h2{font-size:14px;color:#555;text-transform:uppercase;letter-spacing:1px;margin:16px 0 6px;border-left:3px solid #999;padding-left:8px;}
.cv-gratuit p,.cv-gratuit li{font-size:14px;color:#444;margin-bottom:6px;}
.cv-gratuit ul{padding-left:16px;}
.cv-gratuit .watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:22px;font-weight:900;color:rgba(0,0,0,0.06);white-space:nowrap;pointer-events:none;z-index:10;letter-spacing:2px;width:100%;text-align:center;}
.cv-gratuit .footer-brand{text-align:center;margin-top:20px;padding-top:10px;border-top:1px solid #eee;font-size:10px;color:#aaa;font-style:italic;}

/* CV Premium Moderne */
.cv-moderne{font-family:'Segoe UI',sans-serif;color:#2d2d2d;line-height:1.6;}
.cv-moderne .header{background:linear-gradient(135deg,#00b894,#00cec9);color:white;padding:20px;margin:-1px -1px 16px -1px;border-radius:4px 4px 0 0;}
.cv-moderne .header h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.cv-moderne .header .subtitle{font-size:14px;opacity:0.9;}
.cv-moderne .header .contacts{font-size:12px;margin-top:8px;opacity:0.85;}
.cv-moderne h2{font-size:13px;color:#00b894;text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.cv-moderne h2::after{content:'';flex:1;height:1px;background:#e0e0e0;}
.cv-moderne p,.cv-moderne li{font-size:14px;margin-bottom:6px;color:#444;}
.cv-moderne ul{padding-left:18px;}

/* CV Premium Créatif */
.cv-creatif{font-family:'Segoe UI',sans-serif;color:#2d2d2d;line-height:1.6;display:grid;grid-template-columns:35% 65%;}
.cv-creatif .sidebar{background:#1a237e;color:white;padding:20px;min-height:400px;}
.cv-creatif .sidebar h1{font-size:18px;font-weight:700;margin-bottom:4px;color:white;}
.cv-creatif .sidebar .subtitle{font-size:12px;opacity:0.8;margin-bottom:16px;}
.cv-creatif .sidebar h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#80cbc4;margin:14px 0 6px;border-bottom:1px solid rgba(255,255,255,0.2);padding-bottom:4px;}
.cv-creatif .sidebar p,.cv-creatif .sidebar li{font-size:11px;color:rgba(255,255,255,0.85);margin-bottom:4px;}
.cv-creatif .sidebar ul{padding-left:14px;}
.cv-creatif .main{padding:20px;}
.cv-creatif .main h2{font-size:13px;color:#1a237e;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;border-bottom:2px solid #e8f5e9;padding-bottom:4px;}
.cv-creatif .main p,.cv-creatif .main li{font-size:14px;color:#444;margin-bottom:6px;}
.cv-creatif .main ul{padding-left:18px;}

/* CV Premium Élite */
.cv-elite{font-family:'Georgia',serif;color:#1a1a2e;line-height:1.7;}
.cv-elite .header{border-left:5px solid #c0392b;padding-left:16px;margin-bottom:20px;}
.cv-elite .header h1{font-size:26px;color:#c0392b;font-weight:700;margin-bottom:4px;}
.cv-elite .header .subtitle{font-size:15px;color:#555;font-style:italic;}
.cv-elite .contact-bar{background:#f8f8f8;border:1px solid #eee;border-radius:8px;padding:10px 14px;display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.cv-elite .contact-bar span{font-size:12px;color:#666;}
.cv-elite h2{font-size:14px;color:#c0392b;text-transform:uppercase;letter-spacing:2px;margin:18px 0 10px;position:relative;padding-bottom:6px;}
.cv-elite h2::after{content:'';position:absolute;bottom:0;left:0;width:40px;height:2px;background:#c0392b;}
.cv-elite p,.cv-elite li{font-size:15px;color:#333;margin-bottom:8px;}
.cv-elite ul{padding-left:18px;}

/* Bouton WhatsApp flottant */
.wa-float{position:fixed;bottom:24px;right:20px;width:56px;height:56px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);cursor:pointer;z-index:999;text-decoration:none;transition:transform 0.2s;}
.wa-float:hover{transform:scale(1.1);}
.wa-float svg{width:30px;height:30px;fill:white;}
.blur-zone{filter:blur(5px);user-select:none;pointer-events:none;position:relative;}
.blur-zone::after{content:"🔒 Débloquer avec Premium";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,184,148,0.9);color:white;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
@media print{
  body{background:white!important;}
  .wa-float,.no-print{display:none!important;}
  .cv-preview{box-shadow:none!important;border-radius:0!important;padding:20px!important;}
}
</style>
</head>
<body>
<div id="root"></div>

<!-- Bouton WhatsApp flottant -->
<a href="https://wa.me/24162169712?text=Bonjour%20je%20souhaite%20g%C3%A9n%C3%A9rer%20mon%20CV%20sur%20CV%20Pro%20Gabon" target="_blank" class="wa-float" title="Contactez-nous sur WhatsApp">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

  </svg>
</a>

<script type="text/babel">
const {useState,useEffect}=React;
const PRIX=2000;
const STEPS=["Infos perso","Expérience","Formation","Document"];
const VILLES=["Libreville","Port-Gentil","Franceville","Oyem","Moanda","Mouila","Lambaréné","Tchibanga","Koulamoutou","Makokou","Bitam","Ntoum","Owendo","Autre"];
const SECTEURS=["Logistique & Supply Chain","Pétrole & Gaz","BTP & Construction","Finance & Banque","Commerce & Vente","Administration publique","Santé","Éducation","Télécommunications","Autre"];
const NIVEAUX=["Bac","Bac+2 / BTS","Bac+3 / Licence","Bac+4 / Master 1","Bac+5 / Master 2","Doctorat"];
const ECOLES=["AFRAM","UOB (Université Omar Bongo)","USTM","ENS","ENSET","Institut Supérieur de Technologie","ESAG","IAI Gabon","École des Cadres","PIGIER Gabon","Autre"];
const FORM_INIT={prenom:"",nom:"",email:"",telephone:"",ville:"Libreville",poste:"",secteur:"",entreprise:"",experience:"",competences:"",langues:"Français",niveau:"",formation:"",etablissement:"",typeDoc:"les_deux",modele:"moderne"};

// Compteur CV créés (simulé)
const CV_COUNT = 47;

// Modèles
const MODELES_GRATUIT=[{id:"classique_gratuit",label:"Basique",icon:"📋",desc:"Gratuit — avec mention CV Pro Gabon",free:true}];
const MODELES_PREMIUM=[
  {id:"moderne",label:"Moderne",icon:"✨",desc:"Header coloré élégant",free:false},
  {id:"creatif",label:"Créatif",icon:"🎨",desc:"Deux colonnes professionnel",free:false},
  {id:"elite",label:"Élite",icon:"👑",desc:"Style cadre supérieur",free:false},
];

function genCVGratuit(f){
  const exp=(f.experience||"").split(/[;\n]/).filter(e=>e.trim().length>3).map(e=>`<li>${e.trim()}</li>`).join("")||`<li>${f.experience||"À compléter"}</li>`;
  const comp=(f.competences||"").split(/[,;\n]/).filter(c=>c.trim().length>2).map(c=>`<li>${c.trim()}</li>`).join("")||`<li>${f.competences||"À compléter"}</li>`;
  return `<div class="cv-gratuit">
<div class="watermark">CV PRO GABON — APERÇU GRATUIT</div>
<h1>${f.prenom} ${f.nom.toUpperCase()}</h1>
<p class="subtitle">${f.poste}</p>
${f.email?`<p class="contact-line">📧 ${f.email}</p>`:""}
<p class="contact-line">📍 ${f.ville||"Libreville"}, Gabon</p>
<h2>Profil</h2>
<p>Professionnel en ${f.secteur}, titulaire d'un ${f.niveau} en ${f.formation}.</p>
<h2>Expériences</h2><ul>${exp}</ul>
<h2>Compétences</h2><ul>${comp}</ul>
<h2>Formation</h2>
<ul><li><strong>${f.niveau}</strong> — ${f.formation}${f.etablissement?` | ${f.etablissement}`:""}</li></ul>
<h2>Langues</h2><p>${f.langues||"Français"}</p>
<div class="footer-brand">✨ Généré gratuitement sur CV Pro Gabon — cvprogabon.netlify.app</div>
</div>`;
}

function genCVPremium(f,modele){
  const profil=`Professionnel dynamique spécialisé en ${f.poste}, titulaire d'un ${f.niveau} en ${f.formation}${f.etablissement?` obtenu à ${f.etablissement}`:""}. Fort d'une expérience solide dans le secteur ${f.secteur} au Gabon, je me distingue par ${(f.competences||"mes compétences").split(/[,;]/)[0].trim()} et ma capacité d'adaptation. Je souhaite mettre mon expertise au service de ${f.entreprise||"votre organisation"}.`;
  const expItems=(f.experience||"").split(/[;\n]/).filter(e=>e.trim().length>3).map(e=>`<li>${e.trim()}</li>`).join("")||`<li>${f.experience||"À compléter"}</li>`;
  const compItems=(f.competences||"").split(/[,;\n]/).filter(c=>c.trim().length>2).map(c=>`<li>${c.trim()}</li>`).join("")||`<li>${f.competences||"À compléter"}</li>`;

  if(modele==="moderne") return `<div class="cv-moderne">
<div class="header">
  <h1>${f.prenom} ${f.nom.toUpperCase()}</h1>
  <div class="subtitle">${f.poste}</div>
  <div class="contacts">${f.email?`📧 ${f.email}  `:""}${f.telephone?`📞 +241${f.telephone}  `:""}📍 ${f.ville}, Gabon</div>
</div>
<h2>Profil professionnel</h2><p>${profil}</p>
<h2>Expériences professionnelles</h2><ul>${expItems}</ul>
<h2>Compétences</h2><ul>${compItems}</ul>
<h2>Formation</h2><ul><li><strong>${f.niveau}</strong> — ${f.formation}${f.etablissement?` | ${f.etablissement}`:""}</li></ul>
<h2>Langues</h2><p>${f.langues||"Français"}</p>
</div>`;

  if(modele==="creatif") return `<div class="cv-creatif">
<div class="sidebar">
  <h1>${f.prenom}<br/>${f.nom.toUpperCase()}</h1>
  <div class="subtitle">${f.poste}</div>
  <h2>Contact</h2>
  ${f.email?`<p>📧 ${f.email}</p>`:""}
  ${f.telephone?`<p>📞 +241${f.telephone}</p>`:""}
  <p>📍 ${f.ville}, Gabon</p>
  <h2>Compétences</h2><ul>${compItems}</ul>
  <h2>Langues</h2><p>${f.langues||"Français"}</p>
</div>
<div class="main">
  <h2>Profil</h2><p>${profil}</p>
  <h2>Expériences</h2><ul>${expItems}</ul>
  <h2>Formation</h2><ul><li><strong>${f.niveau}</strong> — ${f.formation}${f.etablissement?` | ${f.etablissement}`:""}</li></ul>
</div>
</div>`;

  // Elite
  return `<div class="cv-elite">
<div class="header">
  <h1>${f.prenom} ${f.nom.toUpperCase()}</h1>
  <div class="subtitle">${f.poste} — ${f.secteur}</div>
</div>
<div class="contact-bar">
  ${f.email?`<span>📧 ${f.email}</span>`:""}
  ${f.telephone?`<span>📞 +241${f.telephone}</span>`:""}
  <span>📍 ${f.ville||"Libreville"}, Gabon</span>
</div>
<h2>Profil professionnel</h2><p>${profil}</p>
<h2>Expériences professionnelles</h2><ul>${expItems}</ul>
<h2>Compétences clés</h2><ul>${compItems}</ul>
<h2>Formation académique</h2>
<ul><li><strong>${f.niveau}</strong> — ${f.formation}${f.etablissement?` | ${f.etablissement}`:""}</li></ul>
<h2>Langues</h2><p>${f.langues||"Français"}</p>
</div>`;
}

function genLettre(f){
  const date=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  const ent=f.entreprise||"votre entreprise";
  const comp=(f.competences||"mes compétences").split(/[,;]/)[0].trim();
  const exp=(f.experience||"").split(/[;\n]/)[0].trim();
  return `<div style="font-family:Georgia,serif;color:#1a1a2e;line-height:1.8;font-size:13px;">
<p style="text-align:right">${f.ville||"Libreville"}, le ${date}</p>
<p><strong>${f.prenom} ${f.nom}</strong><br/>${f.email||""}<br/>${f.telephone?`+241${f.telephone}`:""}</p>
<p style="margin-top:16px"><strong>Objet : Candidature au poste de ${f.poste}</strong></p>
<p>Madame, Monsieur,</p>
<p>C'est avec un vif intérêt que je vous soumets ma candidature au poste de <strong>${f.poste}</strong> au sein de ${ent}. Titulaire d'un <strong>${f.niveau} en ${f.formation}</strong>${f.etablissement?` obtenu à ${f.etablissement}`:""},  je possède une solide formation dans le domaine du ${f.secteur}.</p>
<p>${exp.length>5?`Au cours de mon parcours, j'ai notamment ${exp}. Ces expériences m'ont`:"Ces expériences m'ont"} permis de développer des compétences solides en <strong>${comp}</strong>, ainsi qu'une grande rigueur professionnelle et un sens aigu des responsabilités.</p>
<p>Convaincu(e) que mon profil correspond aux exigences du poste et aux valeurs de ${ent}, je reste à votre disposition pour tout entretien à votre convenance.</p>
<p>Dans l'attente d'une réponse favorable, veuillez agréer, Madame, Monsieur, l'expression de mes salutations distinguées.</p>
<p style="margin-top:24px"><strong>${f.prenom} ${f.nom}</strong></p>
</div>`;
}

function generateCode(prenom,nom,poste){
  const seed=(prenom+nom+poste).toLowerCase().replace(/\s/g,"");
  let hash=0;
  for(let i=0;i<seed.length;i++){hash=(hash<<5)-hash+seed.charCodeAt(i);hash|=0;}
  return String(Math.abs(hash)).slice(0,6).padStart(6,"1");
}

function Field({label,value,onChange,placeholder,type="text"}){
  return(<div style={{marginBottom:14}}>
    <div style={{fontSize:11,color:"#90a4ae",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</div>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"11px 14px",color:"#e8edf2",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
  </div>);
}
function SelectField({label,value,onChange,options}){
  return(<div style={{marginBottom:14}}>
    <div style={{fontSize:11,color:"#90a4ae",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</div>
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",background:"#1a2f45",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"11px 14px",color:value?"#e8edf2":"#546e7a",fontSize:14,outline:"none",cursor:"pointer"}}>
      <option value="">Choisir...</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>);
}
function Textarea({label,value,onChange,placeholder,rows=4}){
  return(<div style={{marginBottom:14}}>
    <div style={{fontSize:11,color:"#90a4ae",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</div>
    <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
      style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"11px 14px",color:"#e8edf2",fontSize:14,outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit"}}/>
  </div>);
}

function App(){
  const [page,setPage]=useState("home"); // home | form | result
  const [step,setStep]=useState(0);
  const [form,setForm]=useState(()=>{try{const s=localStorage.getItem("cvpro_form");return s?JSON.parse(s):FORM_INIT;}catch{return FORM_INIT;}});
  const [result,setResult]=useState(null);
  const [isPaid,setIsPaid]=useState(false);
  const [activeTab,setActiveTab]=useState("cv");
  const [copied,setCopied]=useState(false);
  const [showPayModal,setShowPayModal]=useState(false);
  const [codeInput,setCodeInput]=useState("");
  const [codeError,setCodeError]=useState("");

  useEffect(()=>{try{localStorage.setItem("cvpro_form",JSON.stringify(form));}catch{}},[form]);
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));
  const ok=()=>{
    if(step===0)return form.prenom&&form.nom&&form.poste&&form.secteur;
    if(step===1)return form.experience.length>5;
    if(step===2)return form.niveau&&form.formation;
    return true;
  };
  const pct=(step/(STEPS.length-1))*100;
  const isFreePlan=form.modele==="classique_gratuit";

  const genDoc=(paid)=>{
    let cv;
    if(!paid||isFreePlan){cv=genCVGratuit(form);}
    else if(paid==="preview"){
      // Aperçu Premium avec expériences floutées
      const cvFull=genCVPremium(form,form.modele);
      cv=cvFull
        .replace(/<h2[^>]*>Expériences[^<]*<\/h2><ul>([\s\S]*?)<\/ul>/,
          (match,p1)=>`${match.replace(p1,'<span class="blur-zone">'+p1+'</span>')}`)
        .replace(/<h2[^>]*>Compétences[^<]*<\/h2><ul>([\s\S]*?)<\/ul>/,
          (match,p1)=>`${match.replace(p1,'<span class="blur-zone">'+p1+'</span>')}`);
    }
    else{cv=genCVPremium(form,form.modele);}
    const lettre=genLettre(form);
    setResult({cv,lettre});
    setIsPaid(paid===true&&!isFreePlan);
    setActiveTab("cv");
    setPage("result");
  };

  const verifyCode=()=>{
    const expected=generateCode(form.prenom,form.nom,form.poste);
    if(codeInput.trim()===expected){setShowPayModal(false);setCodeError("");genDoc(true);}
    else{setCodeError("Code incorrect. Vérifie le code reçu sur WhatsApp.");}
  };

  const printDoc=()=>{
    const html = activeTab==="cv" ? result.cv : result.lettre;
    const win = window.open('','_blank');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"/><title>CV Pro Gabon</title><style>
      body{font-family:'Segoe UI',Georgia,serif;margin:30px;color:#1a1a2e;line-height:1.7;}
      h1{font-size:26px;} h2{font-size:15px;margin:16px 0 8px;}
      p,li{font-size:14px;margin-bottom:6px;} ul{padding-left:20px;}
      .cv-moderne .header{background:linear-gradient(135deg,#00b894,#00cec9);color:white;padding:20px;margin:-30px -30px 20px -30px;}
      .cv-moderne .header h1{color:white;font-size:24px;}

                    <div style={{fontSize:5,color:"#00b894",fontWeight:700,marginBottom:3,textTransform:"uppercase"}}>Profil</div>
                    <div style={{height:2,background:"#eee",marginBottom:3,borderRadius:1}}/>
                    <div style={{fontSize:5,color:"#00b894",fontWeight:700,marginBottom:2,textTransform:"uppercase"}}>Expériences</div>
                    <div style={{height:2,background:"#eee",marginBottom:1,borderRadius:1}}/>
                    <div style={{height:2,background:"#eee",marginBottom:3,borderRadius:1}}/>
                    <div style={{fontSize:5,color:"#00b894",fontWeight:700,textTransform:"uppercase"}}>Compétences</div>
                  </div>
                  <div style={{background:form.modele==="moderne"?"#00b894":"#f0f0f0",padding:"4px",textAlign:"center"}}>
                    <span style={{fontSize:8,fontWeight:700,color:form.modele==="moderne"?"white":"#666"}}>✨ Moderne</span>
                  </div>
                </button>

                {/* Aperçu Créatif */}
                <button onClick={()=>up("modele","creatif")} style={{padding:0,border:`2px solid ${form.modele==="creatif"?"#00b894":"rgba(255,255,255,0.1)"}`,borderRadius:10,cursor:"pointer",overflow:"hidden",background:"white"}}>
                  <div style={{display:"grid",gridTemplateColumns:"40% 60%",minHeight:90}}>
                    <div style={{background:"#1a237e",padding:"6px"}}>
                      <div style={{fontSize:6,color:"white",fontWeight:700,marginBottom:2}}>Jean<br/>DUPONT</div>
                      <div style={{fontSize:4,color:"rgba(255,255,255,0.7)",marginBottom:4}}>Logistique</div>
                      <div style={{fontSize:4,color:"#80cbc4",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Contact</div>
                      <div style={{height:1,background:"rgba(255,255,255,0.2)",marginBottom:2}}/>
                      <div style={{fontSize:4,color:"#80cbc4",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Compét.</div>
                      <div style={{height:1,background:"rgba(255,255,255,0.2)",marginBottom:1}}/>
                      <div style={{height:1,background:"rgba(255,255,255,0.2)"}}/>
                    </div>
                    <div style={{background:"white",padding:"6px"}}>
                      <div style={{fontSize:4,color:"#1a237e",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Profil</div>
                      <div style={{height:1,background:"#e8f5e9",marginBottom:3}}/>
                      <div style={{fontSize:4,color:"#1a237e",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Expériences</div>
                      <div style={{height:1,background:"#eee",marginBottom:1}}/>
                      <div style={{height:1,background:"#eee",marginBottom:3}}/>
                      <div style={{fontSize:4,color:"#1a237e",fontWeight:700,textTransform:"uppercase"}}>Formation</div>
                    </div>
                  </div>
                  <div style={{background:form.modele==="creatif"?"#00b894":"#f0f0f0",padding:"4px",textAlign:"center"}}>
                    <span style={{fontSize:8,fontWeight:700,color:form.modele==="creatif"?"white":"#666"}}>🎨 Créatif</span>
                  </div>
                </button>

                {/* Aperçu Élite */}
                <button onClick={()=>up("modele","elite")} style={{padding:0,border:`2px solid ${form.modele==="elite"?"#00b894":"rgba(255,255,255,0.1)"}`,borderRadius:10,cursor:"pointer",overflow:"hidden",background:"white"}}>
                  <div style={{padding:"8px",background:"white"}}>
                    <div style={{borderLeft:"3px solid #c0392b",paddingLeft:4,marginBottom:6}}>
                      <div style={{fontSize:8,fontWeight:700,color:"#c0392b"}}>Jean DUPONT</div>
                      <div style={{fontSize:5,color:"#555",fontStyle:"italic"}}>Responsable</div>
                    </div>
                    <div style={{background:"#f8f8f8",padding:"3px 4px",marginBottom:5,borderRadius:2}}>
                      <div style={{fontSize:4,color:"#666"}}>📧 email  📞 tel  📍 ville</div>
                    </div>
                    <div style={{fontSize:5,color:"#c0392b",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Profil</div>
                    <div style={{height:1,background:"#eee",marginBottom:3}}/>
                    <div style={{fontSize:5,color:"#c0392b",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Expériences</div>
                    <div style={{height:1,background:"#eee"}}/>
                  </div>
                  <div style={{background:form.modele==="elite"?"#00b894":"#f0f0f0",padding:"4px",textAlign:"center"}}>
                    <span style={{fontSize:8,fontWeight:700,color:form.modele==="elite"?"white":"#666"}}>👑 Élite</span>
                  </div>
                </button>
              </div>
              <p style={{color:"#546e7a",fontSize:11,textAlign:"center",marginBottom:12}}>Appuie sur un modèle pour le sélectionner</p>
            </div>

            {/* Type doc (premium only) */}
            {!isFreePlan&&(
              <div style={{marginTop:16,background:"rgba(0,184,148,0.06)",border:"1px solid rgba(0,184,148,0.15)",borderRadius:12,padding:"14px"}}>
                <div style={{fontSize:11,color:"#00b894",marginBottom:10,fontWeight:600,textTransform:"uppercase"}}>Type de document</div>
                {[{id:"cv",l:"📄 CV uniquement"},{id:"lettre",l:"✉️ Lettre uniquement"},{id:"les_deux",l:"📦 CV + Lettre (recommandé)"}].map(d=>(
                  <button key={d.id} onClick={()=>up("typeDoc",d.id)} style={{display:"block",width:"100%",padding:"10px 14px",marginBottom:6,background:form.typeDoc===d.id?"rgba(0,184,148,0.2)":"transparent",border:`1px solid ${form.typeDoc===d.id?"rgba(0,184,148,0.4)":"rgba(255,255,255,0.08)"}`,borderRadius:10,cursor:"pointer",color:form.typeDoc===d.id?"#00b894":"#90a4ae",textAlign:"left",fontSize:13,fontWeight:form.typeDoc===d.id?600:400}}>
                    {d.l}
                  </button>
                ))}
              </div>
            )}
          </div>)}
        </div>

        <div style={{display:"flex",gap:12}}>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={C.btnS}>← Retour</button>}
          {step<STEPS.length-1
            ?<button onClick={()=>setStep(s=>s+1)} disabled={!ok()} style={{...C.btnP,opacity:ok()?1:0.4,cursor:ok()?"pointer":"not-allowed"}}>Continuer →</button>
            :<div style={{flex:1,display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",flex:1}}>
              {isFreePlan
                ?<button onClick={()=>genDoc(false)} style={C.btnP}>📋 Générer mon CV gratuit</button>
                :<>
                  <button onClick={()=>genDoc("preview")} style={{...C.btnP,background:"rgba(0,184,148,0.15)",border:"2px solid rgba(0,184,148,0.5)",color:"#00b894"}}>👁️ Voir l'aperçu Premium gratuit</button>
                  <button onClick={()=>setShowPayModal(true)} style={C.btnP}>👑 Payer 2 000 FCFA et générer</button>
                </>
              }
            </div>
            </div>
          }
        </div>
        <p style={{color:"#546e7a",fontSize:11,textAlign:"center",marginTop:12}}>💾 Tes données sont sauvegardées automatiquement</p>
      </div>

      {/* Modal paiement depuis formulaire */}
      {showPayModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"20px"}}>
          <div style={{background:"#1a2f45",borderRadius:20,padding:28,maxWidth:380,width:"100%",border:"1px solid rgba(255,255,255,0.1)"}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:8}}>📱</div>
              <h2 style={{fontSize:18,marginBottom:4}}>Paiement Mobile Money</h2>
            </div>
            <div style={{background:"rgba(0,184,148,0.08)",border:"1px solid rgba(0,184,148,0.2)",borderRadius:12,padding:"16px",marginBottom:16}}>
              <p style={{color:"#e8edf2",fontSize:13,fontWeight:700,marginBottom:10}}>📋 3 étapes simples :</p>
              <p style={{color:"#90a4ae",fontSize:13,marginBottom:8}}><strong style={{color:"#00b894"}}>1.</strong> Envoie <strong style={{color:"#00b894"}}>2 000 FCFA</strong> sur :</p>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <div style={{flex:1,background:"rgba(229,57,53,0.15)",borderRadius:10,padding:"10px",textAlign:"center"}}>
                  <p style={{color:"#ef5350",fontWeight:700,fontSize:10,marginBottom:3}}>AIRTEL MONEY</p>
                  <p style={{color:"#e8edf2",fontWeight:700,fontSize:14}}>077 31 51 01</p>
                </div>
                <div style={{flex:1,background:"rgba(0,137,123,0.15)",borderRadius:10,padding:"10px",textAlign:"center"}}>
                  <p style={{color:"#26a69a",fontWeight:700,fontSize:10,marginBottom:3}}>MOOV MONEY</p>
                  <p style={{color:"#e8edf2",fontWeight:700,fontSize:14}}>062 16 97 12</p>
                </div>
              </div>
              <p style={{color:"#90a4ae",fontSize:12,marginBottom:6}}><strong style={{color:"#00b894"}}>2.</strong> Envoie screenshot + prénom/nom/poste sur WhatsApp → <strong>062 16 97 12</strong></p>
              <p style={{color:"#90a4ae",fontSize:12}}><strong style={{color:"#00b894"}}>3.</strong> Entre le code reçu ci-dessous</p>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"#90a4ae",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>Code de déblocage</div>
              <input type="number" value={codeInput} onChange={e=>setCodeInput(e.target.value.slice(0,6))}
                placeholder="123456" maxLength={6}
                style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"13px",color:"#e8edf2",fontSize:20,outline:"none",boxSizing:"border-box",textAlign:"center",letterSpacing:6,fontWeight:700}}/>
              {codeError&&<p style={{color:"#ef9a9a",fontSize:12,marginTop:6}}>{codeError}</p>}
            </div>
            <button onClick={verifyCode} style={{...C.btnP,marginBottom:10}}>✅ Valider et débloquer</button>
            <button onClick={()=>{setShowPayModal(false);setCodeInput("");setCodeError("");}} style={{...C.btnS,width:"100%",textAlign:"center",fontSize:13}}>Annuler</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

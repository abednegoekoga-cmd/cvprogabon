<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Pro Gabon - Générateur de CV & Lettres de Motivation</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            cursor: pointer;
            user-select: none;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .pricing-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .pricing-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .pricing-card:hover {
            transform: translateY(-5px);
        }

        .pricing-card.premium {
            border: 3px solid #667eea;
        }

        .plan-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .plan-price {
            font-size: 2.5em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .plan-features {
            text-align: left;
            margin-bottom: 30px;
            color: #555;
        }

        .plan-features li {
            list-style: none;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .plan-features li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }

        .select-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s ease;
            width: 100%;
        }

        .select-btn:hover {
            background: #764ba2;
        }

        .select-btn.selected {
            background: #764ba2;
        }

        .form-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #ddd;
            z-index: 0;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .step.active .step-number {
            background: #667eea;
            color: white;
        }

        .step.completed .step-number {
            background: #4caf50;
            color: white;
        }

        .step-label {
            font-size: 0.9em;
            color: #666;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .add-more-btn {
            background: #f0f0f0;
            color: #667eea;
            border: 2px dashed #667eea;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }

        .add-more-btn:hover {
            background: #667eea;
            color: white;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: #764ba2;
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .payment-section {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .payment-info {
            margin-bottom: 20px;
        }

        .payment-method {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
        }

        .payment-method strong {
            color: #667eea;
            display: block;
            margin-bottom: 8px;
        }

        .verification-group {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 2px solid #ddd;
        }

        .verification-group h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .code-input {
            font-size: 1.2em;
            letter-spacing: 3px;
            text-align: center;
            font-weight: bold;
        }

        .verify-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        .verify-btn:hover {
            background: #45a049;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .pdf-preview {
            background: white;
            padding: 40px;
            border-radius: 10px;
            margin-top: 20px;
            min-height: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .pdf-header {
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .pdf-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        .pdf-position {
            color: #667eea;
            font-weight: 500;
            margin-top: 5px;
        }

        .pdf-contact {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }

        .pdf-section-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .pdf-content {
            color: #555;
            line-height: 1.6;
        }

        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 3em;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
            white-space: nowrap;
        }

        .download-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            margin-top: 20px;
            transition: background 0.3s ease;
            width: 100%;
        }

        .download-btn:hover {
            background: #764ba2;
        }

        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .pricing-section {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .steps {
                flex-direction: column;
            }

            .steps::before {
                display: none;
            }

            .step-number {
                width: 35px;
                height: 35px;
                font-size: 1em;
            }
        }

        .admin-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 300px;
            display: none;
            z-index: 1000;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-panel h3 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .admin-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .admin-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
        }

        .admin-btn:hover {
            background: #764ba2;
        }

        .code-output {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            word-break: break-all;
            font-size: 0.85em;
        }

        .close-admin {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function generateCodeHash(name, position) {
            const input = `${name}${position}`.toLowerCase().trim();
            let hash = 0;
            for (let i = 0; i < input.length; i++) {
                const char = input.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString().slice(0, 6).padStart(6, '0');
        }

        function CVProApp() {
            const [plan, setPlan] = React.useState(null);
            const [currentStep, setCurrentStep] = React.useState(1);
            const [isPaid, setIsPaid] = React.useState(false);
            const [adminPanelActive, setAdminPanelActive] = React.useState(false);
            const [logoClickCount, setLogoClickCount] = React.useState(0);
            const [adminPassword, setAdminPassword] = React.useState('');
            const [codeGenName, setCodeGenName] = React.useState('');
            const [codeGenPosition, setCodeGenPosition] = React.useState('');
            const [generatedCode, setGeneratedCode] = React.useState('');
            const [verificationMessage, setVerificationMessage] = React.useState('');

            const [formData, setFormData] = React.useState({
                fullName: '',
                position: '',
                email: '',
                phone: '',
                summary: '',
                experiences: [{ company: '', position: '', duration: '', description: '' }],
                education: [{ school: '', degree: '', year: '', field: '' }],
                skills: '',
                verificationCode: ''
            });

            // Auto-save to localStorage
            React.useEffect(() => {
                localStorage.setItem('cvFormData', JSON.stringify(formData));
            }, [formData]);

            React.useEffect(() => {
                const saved = localStorage.getItem('cvFormData');
                if (saved) {
                    setFormData(JSON.parse(saved));
                }
            }, []);

            const handleLogoClick = () => {
                const newCount = logoClickCount + 1;
                setLogoClickCount(newCount);
                
                if (newCount === 5) {
                    setAdminPanelActive(true);
                    setLogoClickCount(0);
                }
            };

            const verifyAdminPassword = () => {
                if (adminPassword === 'narcisse2024') {
                    alert('✅ Admin panel unlocked!');
                } else {
                    alert('❌ Wrong password');
                }
                setAdminPassword('');
            };

            const generateCode = () => {
                if (!codeGenName || !codeGenPosition) {
                    alert('Please fill in name and position');
                    return;
                }
                const code = generateCodeHash(codeGenName, codeGenPosition);
                setGeneratedCode(code);
            };

            const handleFormChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: value
                }));
            };

            const handleExperienceChange = (index, field, value) => {
                const newExperiences = [...formData.experiences];
                newExperiences[index] = { ...newExperiences[index], [field]: value };
                setFormData(prev => ({
                    ...prev,
                    experiences: newExperiences
                }));
            };

            const handleEducationChange = (index, field, value) => {
                const newEducation = [...formData.education];
                newEducation[index] = { ...newEducation[index], [field]: value };
                setFormData(prev => ({
                    ...prev,
                    education: newEducation
                }));
            };

            const addExperience = () => {
                setFormData(prev => ({
                    ...prev,
                    experiences: [...prev.experiences, { company: '', position: '', duration: '', description: '' }]
                }));
            };

            const removeExperience = (index) => {
                setFormData(prev => ({
                    ...prev,
                    experiences: prev.experiences.filter((_, i) => i !== index)
                }));
            };

            const addEducation = () => {
                setFormData(prev => ({
                    ...prev,
                    education: [...prev.education, { school: '', degree: '', year: '', field: '' }]
                }));
            };

            const removeEducation = (index) => {
                setFormData(prev => ({
                    ...prev,
                    education: prev.education.filter((_, i) => i !== index)
                }));
            };

            const verifyCode = () => {
                const expectedCode = generateCodeHash(formData.fullName, formData.position);
                if (formData.verificationCode === expectedCode) {
                    setVerificationMessage({ type: 'success', text: '✅ Code verified! Generating PDF...' });
                    setIsPaid(true);
                    setTimeout(() => {
                        generatePDF();
                    }, 500);
                } else {
                    setVerificationMessage({ type: 'error', text: '❌ Invalid code. Please try again.' });
                }
            };

            const generatePDF = () => {
                const element = document.getElementById('pdf-content');
                const opt = {
                    margin: 10,
                    filename: `${formData.fullName}_CV.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
                };
                html2pdf().set(opt).from(element).save();
            };

            const selectPlan = (selectedPlan) => {
                setPlan(selectedPlan);
                setCurrentStep(2);
            };

            const goToStep = (step) => {
                if (step < currentStep || step === 1) {
                    setCurrentStep(step);
                } else if (step === currentStep + 1) {
                    setCurrentStep(step);
                }
            };

            return (
                <div className="container">
                    <div className="header" onClick={handleLogoClick}>
                        <h1>🎓 CV Pro Gabon</h1>
                        <p>Générez des CV et lettres de motivation professionnels en quelques minutes</p>
                    </div>

                    {plan === null ? (
                        <div className="pricing-section">
                            <div className="pricing-card">
                                <div className="plan-name">📋 Free</div>
                                <div className="plan-price">0 FCFA</div>
                                <ul className="plan-features">
                                    <li>Modèle basique</li>
                                    <li>Export PDF</li>
                                    <li>Watermark inclus</li>
                                    <li>Support communautaire</li>
                                </ul>
                                <button className="select-btn" onClick={() => selectPlan('free')}>
                                    Choisir Free
                                </button>
                            </div>

                            <div className="pricing-card premium">
                                <div className="plan-name">⭐ Premium</div>
                                <div className="plan-price">2 000 FCFA</div>
                                <ul className="plan-features">
                                    <li>3 modèles exclusifs</li>
                                    <li>Pas de watermark</li>
                                    <li>Export PDF haute qualité</li>
                                    <li>Support prioritaire</li>
                                    <li>Accès illimité</li>
                                </ul>
                                <button className="select-btn" onClick={() => selectPlan('premium')}>
                                    Choisir Premium
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="form-container">
                            <div className="steps">
                                {[1, 2, 3, 4].map(step => (
                                    <div key={step} className={`step ${step === currentStep ? 'active' : ''} ${step < currentStep ? 'completed' : ''}`} onClick={() => goToStep(step)}>
                                        <div className="step-number">{step}</div>
                                        <div className="step-label">
                                            {step === 1 && 'Infos Perso'}
                                            {step === 2 && 'Expérience'}
                                            {step === 3 && 'Compétences'}
                                            {step === 4 && 'Paiement'}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {currentStep === 1 && (
                                <div className="form-section active">
                                    <h2>Vos Informations Personnelles</h2>
                                    <div className="form-group">
                                        <label>Nom Complet *</label>
                                        <input type="text" name="fullName" value={formData.fullName} onChange={handleFormChange} placeholder="Jean Dupont" />
                                    </div>
                                    <div className="form-group">
                                        <label>Poste Actuel *</label>
                                        <input type="text" name="position" value={formData.position} onChange={handleFormChange} placeholder="Développeur Web" />
                                    </div>
                                    <div className="form-group">
                                        <label>Email</label>
                                        <input type="email" name="email" value={formData.email} onChange={handleFormChange} placeholder="jean@example.com" />
                                    </div>
                                    <div className="form-group">
                                        <label>Téléphone</label>
                                        <input type="tel" name="phone" value={formData.phone} onChange={handleFormChange} placeholder="+241 06 XXXXXXXX" />
                                    </div>
                                    <div className="form-group">
                                        <label>Résumé Professionnel</label>
                                        <textarea name="summary" value={formData.summary} onChange={handleFormChange} placeholder="Décrivez votre profil..."></textarea>
                                    </div>
                                </div>
                            )}

                            {currentStep === 2 && (
                                <div className="form-section active">
                                    <h2>Expérience Professionnelle</h2>
                                    {formData.experiences.map((exp, index) => (
                                        <div key={index} style={{ marginBottom: '20px', padding: '15px', background: '#f9f9f9', borderRadius: '8px' }}>
                                            <div className="form-group">
                                                <label>Entreprise</label>
                                                <input type="text" value={exp.company} onChange={(e) => handleExperienceChange(index, 'company', e.target.value)} placeholder="Nom de l'entreprise" />
                                            </div>
                                            <div className="form-group">
                                                <label>Poste</label>
                                                <input type="text" value={exp.position} onChange={(e) => handleExperienceChange(index, 'position', e.target.value)} placeholder="Votre poste" />
                                            </div>
                                            <div className="form-group">
                                                <label>Durée</label>
                                                <input type="text" value={exp.duration} onChange={(e) => handleExperienceChange(index, 'duration', e.target.value)} placeholder="2020-2023" />
                                            </div>
                                            <div className="form-group">
                                                <label>Description</label>
                                                <textarea value={exp.description} onChange={(e) => handleExperienceChange(index, 'description', e.target.value)} placeholder="Décrivez vos responsabilités..."></textarea>
                                            </div>
                                            {formData.experiences.length > 1 && (
                                                <button className="remove-btn" onClick={() => removeExperience(index)}>Supprimer</button>
                                            )}
                                        </div>
                                    ))}
                                    <button className="add-more-btn" onClick={addExperience}>+ Ajouter une expérience</button>

                                    <h2 style={{ marginTop: '30px' }}>Formation</h2>
                                    {formData.education.map((edu, index) => (
                                        <div key={index} style={{ marginBottom: '20px', padding: '15px', background: '#f9f9f9', borderRadius: '8px' }}>
                                            <div className="form-group">
                                                <label>École/Université</label>
                                                <input type="text" value={edu.school} onChange={(e) => handleEducationChange(index, 'school', e.target.value)} placeholder="Nom de l'établissement" />
                                            </div>
                                            <div className="form-group">
                                                <label>Diplôme</label>
                                                <input type="text" value={edu.degree} onChange={(e) => handleEducationChange(index, 'degree', e.target.value)} placeholder="Licence, Master, etc." />
                                            </div>
                                            <div className="form-group">
                                                <label>Domaine</label>
                                                <input type="text" value={edu.field} onChange={(e) => handleEducationChange(index, 'field', e.target.value)} placeholder="Informatique, Gestion, etc." />
                                            </div>
                                            <div className="form-group">
                                                <label>Année</label>
                                                <input type="text" value={edu.year} onChange={(e) => handleEducationChange(index, 'year', e.target.value)} placeholder="2023" />
                                            </div>
                                            {formData.education.length > 1 && (
                                                <button className="remove-btn" onClick={() => removeEducation(index)}>Supprimer</button>
                                            )}
                                        </div>
                                    ))}
                                    <button className="add-more-btn" onClick={addEducation}>+ Ajouter une formation</button>
                                </div>
                            )}

                            {currentStep === 3 && (
                                <div className="form-section active">
                                    <h2>Compétences</h2>
                                    <div className="form-group">
                                        <label>Compétences (séparées par des virgules)</label>
                                        <textarea name="skills" value={formData.skills} onChange={handleFormChange} placeholder="JavaScript, React, Node.js, etc."></textarea>
                                    </div>
                                </div>
                            )}

                            {currentStep === 4 && (
                                <div className="form-section active">
                                    <h2>Financer votre CV Premium</h2>
                                    
                                    {plan === 'premium' && (
                                        <div className="payment-section">
                                            <h3>💳 Paiement Requis</h3>
                                            <p>Montant: <strong style={{ color: '#667eea' }}>2 000 FCFA</strong></p>
                                            
                                            <div className="payment-method">
                                                <strong>📱 Airtel Money</strong>
                                                Numéro: <strong>077 31 51 01</strong><br/>
                                                Destinataire: Narcisse E.
                                            </div>

                                            <div className="payment-method">
                                                <strong>📱 Moov Money</strong>
                                                Numéro: <strong>062 16 97 12</strong><br/>
                                                Destinataire: Narcisse E.
                                            </div>

                                            <div className="verification-group">
                                                <h3>Entrez votre code de vérification</h3>
                                                <p style={{ color: '#666', marginBottom: '15px' }}>Après paiement, vous recevrez un code à 6 chiffres.</p>
                                                <input 
                                                    type="text" 
                                                    className="code-input"
                                                    name="verificationCode"
                                                    value={formData.verificationCode}
                                                    onChange={handleFormChange}
                                                    placeholder="000000"
                                                    maxLength="6"
                                                />
                                                <button className="verify-btn" onClick={verifyCode}>
                                                    Vérifier le code
                                                </button>
                                                {verificationMessage && (
                                                    <div className={`message ${verificationMessage.type}`}>
                                                        {verificationMessage.text}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {plan === 'free' && (
                                        <div className="payment-section">
                                            <h3>✅ Plan Gratuit</h3>
                                            <p>Vous pouvez maintenant télécharger votre CV !</p>
                                            <p style={{ color: '#ff6b6b' }}>⚠️ Watermark inclus</p>
                                            <button className="download-btn" onClick={() => setIsPaid(true)}>
                                                Générer le PDF
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}

                            <div className="navigation">
                                <button className="nav-btn" disabled={currentStep === 1} onClick={() => setCurrentStep(currentStep - 1)}>
                                    ← Précédent
                                </button>
                                <button className="nav-btn" disabled={currentStep === 4} onClick={() => setCurrentStep(currentStep + 1)}>
                                    Suivant →
                                </button>
                            </div>
                        </div>
                    )}

                    {isPaid && (
                        <div className="form-container">
                            <h2>📄 Aperçu de votre CV</h2>
                            <div id="pdf-content" className="pdf-preview">
                                {plan === 'free' && <div className="watermark">CV PRO</div>}
                                <div className="pdf-header">
                                    <div className="pdf-name">{formData.fullName || 'Votre Nom'}</div>
                                    <div className="pdf-position">{formData.position || 'Votre Poste'}</div>
                                    <div className="pdf-contact">
                                        {formData.email && <span>📧 {formData.email} | </span>}
                                        {formData.phone && <span>📱 {formData.phone}</span>}
                                    </div>
                                </div>

                                {formData.summary && (
                                    <div>
                                        <div className="pdf-section-title">Résumé</div>
                                        <div className="pdf-content">{formData.summary}</div>
                                    </div>
                                )}

                                {formData.experiences.some(e => e.company) && (
                                    <div>
                                        <div className="pdf-section-title">Expérience Professionnelle</div>
                                        {formData.experiences.map((exp, index) => (
                                            exp.company && (
                                                <div key={index} style={{ marginBottom: '15px' }}>
                                                    <div style={{ fontWeight: 'bold', color: '#333' }}>{exp.position} - {exp.company}</div>
                                                    <div style={{ color: '#667eea', fontSize: '0.9em' }}>{exp.duration}</div>
                                                    <div className="pdf-content">{exp.description}</div>
                                                </div>
                                            )
                                        ))}
                                    </div>
                                )}

                                {formData.education.some(e => e.school) && (
                                    <div>
                                        <div className="pdf-section-title">Formation</div>
                                        {formData.education.map((edu, index) => (
                                            edu.school && (
                                                <div key={index} style={{ marginBottom: '15px' }}>
                                                    <div style={{ fontWeight: 'bold', color: '#333' }}>{edu.degree} en {edu.field}</div>
                                                    <div style={{ color: '#667eea', fontSize: '0.9em' }}>{edu.school} - {edu.year}</div>
                                                </div>
                                            )
                                        ))}
                                    </div>
                                )}

                                {formData.skills && (
                                    <div>
                                        <div className="pdf-section-title">Compétences</div>
                                        <div className="pdf-content">{formData.skills}</div>
                                    </div>
                                )}
                            </div>

                            {isPaid && (
                                <button className="download-btn" onClick={generatePDF}>
                                    📥 Baixar PDF
                                </button>
                            )}
                        </div>
                    )}

                    {adminPanelActive && (
                        <div className="admin-panel active">
                            <h3>🔐 Admin Panel</h3>
                            <input 
                                type="password" 
                                className="admin-input" 
                                placeholder="Password" 
                                value={adminPassword}
                                onChange={(e) => setAdminPassword(e.target.value)}
                            />
                            <button className="admin-btn" onClick={verifyAdminPassword}>Unlock</button>

                            {adminPassword === 'narcisse2024' && (
                                <>
                                    <input 
                                        type="text" 
                                        className="admin-input" 
                                        placeholder="Nom complet" 
                                        value={codeGenName}
                                        onChange={(e) => setCodeGenName(e.target.value)}
                                    />
                                    <input 
                                        type="text" 
                                        className="admin-input" 
                                        placeholder="Poste" 
                                        value={codeGenPosition}
                                        onChange={(e) => setCodeGenPosition(e.target.value)}
                                    />
                                    <button className="admin-btn" onClick={generateCode}>Generate Code</button>
                                    {generatedCode && (
                                        <div className="code-output">
                                            Code: {generatedCode}
                                        </div>
                                    )}
                                </>
                            )}

                            <button className="close-admin" onClick={() => setAdminPanelActive(false)}>Close</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CVProApp />);
    </script>
</body>
</html>

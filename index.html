<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Pro Gabon</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .pricing-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .pricing-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .plan-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .plan-price {
            font-size: 2.5em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .plan-features {
            text-align: left;
            margin-bottom: 30px;
            color: #555;
        }

        .plan-features li {
            list-style: none;
            padding: 10px 0;
        }

        .plan-features li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }

        .select-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            width: 100%;
        }

        .select-btn:hover {
            background: #764ba2;
        }

        .form-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .add-btn {
            background: #f0f0f0;
            color: #667eea;
            border: 2px dashed #667eea;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }

        .add-btn:hover {
            background: #667eea;
            color: white;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
        }

        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
        }

        .nav-btn:hover:not(:disabled) {
            background: #764ba2;
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .payment-box {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .payment-method {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #ddd;
        }

        .code-input {
            font-size: 1.2em;
            letter-spacing: 3px;
            text-align: center;
            font-weight: bold;
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .verify-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .verify-btn:hover {
            background: #45a049;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .pdf-preview {
            background: white;
            padding: 40px;
            border-radius: 10px;
            margin-top: 20px;
            min-height: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .pdf-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .download-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            margin-top: 20px;
            width: 100%;
        }

        .download-btn:hover {
            background: #764ba2;
        }

        .watermark-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 3em;
            opacity: 0.1;
            z-index: -1;
            white-space: nowrap;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .steps {
            display: flex;
            justify-content: space-around;
            margin-bottom: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .step {
            text-align: center;
            flex: 1;
        }

        .step-num {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
        }

        .step.active .step-num {
            background: #667eea;
        }

        .step.completed .step-num {
            background: #4caf50;
        }

        @media (max-width: 768px) {
            .pricing-section {
                grid-template-columns: 1fr;
            }

            .steps {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString().slice(0, 6).padStart(6, '0');
        }

        function App() {
            const [plan, setPlan] = useState(null);
            const [step, setStep] = useState(1);
            const [isPaid, setIsPaid] = useState(false);
            const [message, setMessage] = useState('');

            const [data, setData] = useState({
                fullName: '',
                position: '',
                email: '',
                phone: '',
                summary: '',
                experiences: [{ company: '', position: '', duration: '', desc: '' }],
                education: [{ school: '', degree: '', year: '', field: '' }],
                skills: '',
                code: ''
            });

            useEffect(() => {
                const saved = localStorage.getItem('cvData');
                if (saved) setData(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('cvData', JSON.stringify(data));
            }, [data]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setData(prev => ({ ...prev, [name]: value }));
            };

            const handleExpChange = (idx, field, val) => {
                const newExp = [...data.experiences];
                newExp[idx][field] = val;
                setData(prev => ({ ...prev, experiences: newExp }));
            };

            const handleEduChange = (idx, field, val) => {
                const newEdu = [...data.education];
                newEdu[idx][field] = val;
                setData(prev => ({ ...prev, education: newEdu }));
            };

            const addExp = () => {
                setData(prev => ({
                    ...prev,
                    experiences: [...prev.experiences, { company: '', position: '', duration: '', desc: '' }]
                }));
            };

            const removeExp = (idx) => {
                setData(prev => ({
                    ...prev,
                    experiences: prev.experiences.filter((_, i) => i !== idx)
                }));
            };

            const addEdu = () => {
                setData(prev => ({
                    ...prev,
                    education: [...prev.education, { school: '', degree: '', year: '', field: '' }]
                }));
            };

            const removeEdu = (idx) => {
                setData(prev => ({
                    ...prev,
                    education: prev.education.filter((_, i) => i !== idx)
                }));
            };

            const verifyCode = () => {
                const expectedCode = hashCode(data.fullName + data.position);
                if (data.code === expectedCode) {
                    setMessage({ type: 'success', text: '✅ Code valide ! PDF généré.' });
                    setIsPaid(true);
                    setTimeout(() => generatePDF(), 500);
                } else {
                    setMessage({ type: 'error', text: '❌ Code invalide !' });
                }
            };

            const generatePDF = () => {
                const element = document.getElementById('pdf-content');
                if (!element) return;
                const opt = {
                    margin: 10,
                    filename: `${data.fullName}_CV.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
                };
                html2pdf().set(opt).from(element).save();
            };

            if (plan === null) {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>🎓 CV Pro Gabon</h1>
                            <p>Générez des CVs professionnels en quelques minutes</p>
                        </div>

                        <div className="pricing-section">
                            <div className="pricing-card">
                                <div className="plan-name">📋 Free</div>
                                <div className="plan-price">0 FCFA</div>
                                <ul className="plan-features">
                                    <li>Modèle basique</li>
                                    <li>Export PDF</li>
                                    <li>Watermark</li>
                                </ul>
                                <button className="select-btn" onClick={() => { setPlan('free'); setStep(1); }}>
                                    Choisir
                                </button>
                            </div>

                            <div className="pricing-card">
                                <div className="plan-name">⭐ Premium</div>
                                <div className="plan-price">2 000 FCFA</div>
                                <ul className="plan-features">
                                    <li>3 modèles exclusifs</li>
                                    <li>Sans watermark</li>
                                    <li>PDF haute qualité</li>
                                </ul>
                                <button className="select-btn" onClick={() => { setPlan('premium'); setStep(1); }}>
                                    Choisir
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <div className="header">
                        <h1>🎓 CV Pro Gabon</h1>
                        <p>Plan: <strong>{plan === 'free' ? 'FREE' : 'PREMIUM'}</strong></p>
                    </div>

                    <div className="form-container">
                        <div className="steps">
                            {[1, 2, 3, 4].map(s => (
                                <div key={s} className={`step ${s === step ? 'active' : ''} ${s < step ? 'completed' : ''}`}>
                                    <div className="step-num">{s}</div>
                                    <div>{s === 1 ? 'Infos' : s === 2 ? 'Expérience' : s === 3 ? 'Compétences' : 'Paiement'}</div>
                                </div>
                            ))}
                        </div>

                        {step === 1 && (
                            <div>
                                <h2>Vos Informations</h2>
                                <div className="form-group">
                                    <label>Nom Complet *</label>
                                    <input type="text" name="fullName" value={data.fullName} onChange={handleChange} placeholder="Jean Dupont" />
                                </div>
                                <div className="form-group">
                                    <label>Poste *</label>
                                    <input type="text" name="position" value={data.position} onChange={handleChange} placeholder="Développeur" />
                                </div>
                                <div className="form-group">
                                    <label>Email</label>
                                    <input type="email" name="email" value={data.email} onChange={handleChange} />
                                </div>
                                <div className="form-group">
                                    <label>Téléphone</label>
                                    <input type="tel" name="phone" value={data.phone} onChange={handleChange} />
                                </div>
                                <div className="form-group">
                                    <label>Résumé</label>
                                    <textarea name="summary" value={data.summary} onChange={handleChange}></textarea>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div>
                                <h2>Expérience Professionnelle</h2>
                                {data.experiences.map((exp, idx) => (
                                    <div key={idx} style={{ marginBottom: '20px', padding: '15px', background: '#f9f9f9', borderRadius: '8px' }}>
                                        <input type="text" placeholder="Entreprise" value={exp.company} onChange={(e) => handleExpChange(idx, 'company', e.target.value)} className="form-group" style={{ width: '100%', marginBottom: '10px', padding: '8px', border: '1px solid #ddd', borderRadius: '5px' }} />
                                        <input type="text" placeholder="Poste" value={exp.position} onChange={(e) => handleExpChange(idx, 'position', e.target.value)} className="form-group" style={{ width: '100%', marginBottom: '10px', padding: '8px', border: '1px solid #ddd', borderRadius: '5px' }} />
                                        <input type="text" placeholder="Durée (ex: 2020-2023)" value={exp.duration} onChange={(e) => handleExpChange(idx, 'duration', e.target.value)} className="form-group" style={{ width: '100%', marginBottom: '10px', padding: '8px', border: '1px solid #ddd', borderRadius: '5px' }} />
                                        <textarea placeholder="Description" value={exp.desc} onChange={(e) => handleExpChange(idx, 'desc', e.target.value)} style={{ width: '100%', padding: '8px', border: '1px solid #ddd', borderRadius: '5px', minHeight: '80px' }}></textarea>
                                        {data.experiences.length > 1 && <button className="remove-btn" onClick={() => removeExp(idx)}>Supprimer</button>}
                                    </div>
                                ))}
                                <button className="add-btn" onClick={addExp}>+ Ajouter Expérience</button>

                                <h2>Formation</h2>
                                {data.education.map((edu, idx) => (
                                    <div key={idx} style={{ marginBottom: '20px', padding: '15px', background: '#f9f9f9', borderRadius: '8px' }}>
                                        <input type="text" placeholder="École" value={edu.school} onChange={(e) => handleEduChange(idx, 'school', e.target.value)} style={{ width: '100%', marginBottom: '10px', padding: '8px', border: '1px solid #ddd', borderRadius: '5px' }} />
                                        <input type="text" placeholder="Diplôme" value={edu.degree} onChange={(e) => handleEduChange(idx, 'degree', e.target.value)} style={{ width: '100%', marginBottom: '10px', padding: '8px', border: '1px solid #ddd', borderRadius: '5px' }} />
                                        <input type="text" placeholder="Domaine" value={edu.field} onChange={(e) => handleEduChange(idx, 'field', e.target.value)} style={{ width: '100%', marginBottom: '10px', padding: '8px', border: '1px solid #ddd', borderRadius: '5px' }} />
                                        <input type="text" placeholder="Année" value={edu.year} onChange={(e) => handleEduChange(idx, 'year', e.target.value)} style={{ width: '100%', padding: '8px', border: '1px solid #ddd', borderRadius: '5px' }} />
                                        {data.education.length > 1 && <button className="remove-btn" onClick={() => removeEdu(idx)}>Supprimer</button>}
                                    </div>
                                ))}
                                <button className="add-btn" onClick={addEdu}>+ Ajouter Formation</button>
                            </div>
                        )}

                        {step === 3 && (
                            <div>
                                <h2>Compétences</h2>
                                <div className="form-group">
                                    <label>Compétences (séparées par des virgules)</label>
                                    <textarea name="skills" value={data.skills} onChange={handleChange} placeholder="JavaScript, React, Node.js..."></textarea>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div>
                                <h2>Paiement & Téléchargement</h2>
                                {plan === 'free' && (
                                    <div className="payment-box">
                                        <h3>✅ Plan Gratuit</h3>
                                        <p>Vous pouvez télécharger votre CV gratuitement !</p>
                                        <p style={{ color: '#ff6b6b', marginTop: '10px' }}>⚠️ Watermark inclus</p>
                                        <button className="verify-btn" onClick={() => setIsPaid(true)}>Générer PDF</button>
                                    </div>
                                )}

                                {plan === 'premium' && (
                                    <div className="payment-box">
                                        <h3>💳 Paiement Requis: 2 000 FCFA</h3>
                                        <div className="payment-method">
                                            <strong>📱 Airtel Money</strong><br/>
                                            077 31 51 01 (Narcisse E.)
                                        </div>
                                        <div className="payment-method">
                                            <strong>📱 Moov Money</strong><br/>
                                            062 16 97 12 (Narcisse E.)
                                        </div>
                                        <div style={{ marginTop: '20px' }}>
                                            <label>Code de vérification (6 chiffres):</label>
                                            <input type="text" name="code" value={data.code} onChange={handleChange} maxLength="6" placeholder="000000" className="code-input" />
                                            <button className="verify-btn" onClick={verifyCode}>Vérifier</button>
                                            {message && <div className={`message ${message.type}`}>{message.text}</div>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="nav-buttons">
                            <button className="nav-btn" disabled={step === 1} onClick={() => setStep(step - 1)}>← Précédent</button>
                            <button className="nav-btn" disabled={step === 4} onClick={() => setStep(step + 1)}>Suivant →</button>
                        </div>
                    </div>

                    {isPaid && (
                        <div className="form-container">
                            <h2>📄 Aperçu de votre CV</h2>
                            <div id="pdf-content" className="pdf-preview">
                                {plan === 'free' && <div className="watermark-text">CV PRO</div>}
                                <div className="pdf-name">{data.fullName || 'Votre Nom'}</div>
                                <div style={{ color: '#667eea', fontWeight: 'bold', marginBottom: '10px' }}>{data.position}</div>
                                <div style={{ color: '#666', marginBottom: '20px' }}>
                                    {data.email} | {data.phone}
                                </div>

                                {data.summary && (
                                    <div>
                                        <h3 style={{ marginTop: '20px', borderBottom: '2px solid #667eea', paddingBottom: '10px' }}>Résumé</h3>
                                        <p>{data.summary}</p>
                                    </div>
                                )}

                                {data.experiences.some(e => e.company) && (
                                    <div>
                                        <h3 style={{ marginTop: '20px', borderBottom: '2px solid #667eea', paddingBottom: '10px' }}>Expérience</h3>
                                        {data.experiences.map((exp, i) => exp.company && (
                                            <div key={i} style={{ marginBottom: '15px' }}>
                                                <div style={{ fontWeight: 'bold' }}>{exp.position} - {exp.company}</div>
                                                <div style={{ color: '#667eea', fontSize: '0.9em' }}>{exp.duration}</div>
                                                <p>{exp.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {data.education.some(e => e.school) && (
                                    <div>
                                        <h3 style={{ marginTop: '20px', borderBottom: '2px solid #667eea', paddingBottom: '10px' }}>Formation</h3>
                                        {data.education.map((edu, i) => edu.school && (
                                            <div key={i} style={{ marginBottom: '15px' }}>
                                                <div style={{ fontWeight: 'bold' }}>{edu.degree} en {edu.field}</div>
                                                <div style={{ color: '#667eea', fontSize: '0.9em' }}>{edu.school} - {edu.year}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {data.skills && (
                                    <div>
                                        <h3 style={{ marginTop: '20px', borderBottom: '2px solid #667eea', paddingBottom: '10px' }}>Compétences</h3>
                                        <p>{data.skills}</p>
                                    </div>
                                )}
                            </div>

                            <button className="download-btn" onClick={generatePDF}>📥 Télécharger PDF</button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

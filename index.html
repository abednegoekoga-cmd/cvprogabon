  --bg:#0d1b2a;

  --border:rgba(255,255,255,0.09);

  --accent2:#0096c7;
  --text:#e2e8f0;
  --text2:#94a3b8;

body{background:var(--bg);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
input,select,textarea{color:var(--text)!important;font-family:inherit;}
input::placeholder,textarea::placeholder{color:#475569!important;}
select option{background:#1e3a5f;color:var(--text);}

@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,0.4);}50%{box-shadow:0 0 0 12px rgba(0,212,170,0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.fade{animation:fade 0.35s ease;}
.pulse-btn{animation:pulse 2s infinite;}

/* ==================== CV TEMPLATES ==================== */

/* Gratuit - Classique */
.cv-gratuit{font-family:'Georgia',serif;color:#1a1a2e;line-height:1.65;position:relative;padding:24px;}
.cv-gratuit h1{font-size:22px;color:#222;border-bottom:2px solid #888;padding-bottom:8px;margin-bottom:6px;}
.cv-gratuit .subtitle{font-size:13px;color:#555;font-style:italic;margin-bottom:8px;}
.cv-gratuit .contact-line{font-size:12px;color:#666;margin-bottom:3px;}
.cv-gratuit h2{font-size:13px;color:#444;text-transform:uppercase;letter-spacing:1px;margin:16px 0 6px;border-left:3px solid #888;padding-left:8px;}
.cv-gratuit p,.cv-gratuit li{font-size:13px;color:#333;margin-bottom:5px;}
.cv-gratuit ul{padding-left:16px;}
.cv-gratuit .watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:20px;font-weight:900;color:rgba(0,0,0,0.05);white-space:nowrap;pointer-events:none;z-index:10;letter-spacing:2px;width:100%;text-align:center;}
.cv-gratuit .footer-brand{text-align:center;margin-top:18px;padding-top:8px;border-top:1px solid #eee;font-size:10px;color:#aaa;}

/* Premium Moderne */
.cv-moderne{font-family:'Segoe UI',sans-serif;color:#1e293b;line-height:1.65;}
.cv-moderne .header{background:linear-gradient(135deg,#00d4aa,#0096c7);color:white;padding:22px 26px;border-radius:6px 6px 0 0;}
.cv-moderne .header h1{font-size:24px;font-weight:700;margin-bottom:4px;}
.cv-moderne .header .subtitle{font-size:14px;opacity:0.92;}
.cv-moderne .header .contacts{font-size:12px;margin-top:8px;opacity:0.88;}
.cv-moderne .body{padding:18px 22px;}
.cv-moderne h2{font-size:12px;color:#00b894;text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.cv-moderne h2::after{content:'';flex:1;height:1px;background:#e2e8f0;}
.cv-moderne p,.cv-moderne li{font-size:13px;margin-bottom:5px;color:#374151;}
.cv-moderne ul{padding-left:18px;}

/* Premium Créatif */
.cv-creatif{font-family:'Segoe UI',sans-serif;color:#1e293b;line-height:1.65;display:grid;grid-template-columns:36% 64%;}
.cv-creatif .sidebar{background:linear-gradient(180deg,#1e3a5f 0%,#0f2235 100%);color:white;padding:22px 18px;min-height:500px;}
.cv-creatif .sidebar h1{font-size:18px;font-weight:800;margin-bottom:4px;color:white;line-height:1.3;}
.cv-creatif .sidebar .subtitle{font-size:11px;opacity:0.75;margin-bottom:14px;color:#7dd3fc;}
.cv-creatif .sidebar h2{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#7dd3fc;margin:14px 0 6px;border-bottom:1px solid rgba(255,255,255,0.15);padding-bottom:4px;}
.cv-creatif .sidebar p,.cv-creatif .sidebar li{font-size:11px;color:rgba(255,255,255,0.82);margin-bottom:4px;}
.cv-creatif .sidebar ul{padding-left:12px;}
.cv-creatif .main{padding:22px 20px;background:#fff;}
.cv-creatif .main h2{font-size:12px;color:#1e3a5f;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;border-bottom:2px solid #e0f2fe;padding-bottom:4px;}
.cv-creatif .main p,.cv-creatif .main li{font-size:13px;color:#374151;margin-bottom:5px;}
.cv-creatif .main ul{padding-left:16px;}

/* Premium Élite */
.cv-elite{font-family:'Georgia',serif;color:#1a1a2e;line-height:1.7;padding:28px;}
.cv-elite .header{border-left:5px solid #b91c1c;padding-left:16px;margin-bottom:18px;}
.cv-elite .header h1{font-size:26px;color:#b91c1c;font-weight:700;margin-bottom:4px;}
.cv-elite .header .subtitle{font-size:14px;color:#555;font-style:italic;}
.cv-elite .contact-bar{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
.cv-elite .contact-bar span{font-size:12px;color:#555;}
.cv-elite h2{font-size:13px;color:#b91c1c;text-transform:uppercase;letter-spacing:2px;margin:18px 0 8px;padding-bottom:5px;position:relative;}
.cv-elite h2::after{content:'';position:absolute;bottom:0;left:0;width:38px;height:2px;background:#b91c1c;}
.cv-elite p,.cv-elite li{font-size:14px;color:#2d2d2d;margin-bottom:7px;}
.cv-elite ul{padding-left:18px;}

/* Premium Minimaliste */
.cv-minimal{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#111;line-height:1.6;padding:32px;}
.cv-minimal .header{margin-bottom:22px;padding-bottom:14px;border-bottom:0.5px solid #ddd;}
.cv-minimal .header h1{font-size:28px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:#111;margin-bottom:4px;}
.cv-minimal .header .subtitle{font-size:13px;color:#777;letter-spacing:1px;text-transform:uppercase;}
.cv-minimal .contacts{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;}
.cv-minimal .contacts span{font-size:11px;color:#666;}
.cv-minimal h2{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:3px;margin:22px 0 10px;font-weight:400;}
.cv-minimal p,.cv-minimal li{font-size:13px;color:#333;margin-bottom:5px;}
.cv-minimal ul{padding-left:16px;}

/* Blur pour aperçu limité */
.blur-zone{filter:blur(5px);user-select:none;pointer-events:none;position:relative;display:inline;}
.blur-zone::after{content:"🔒 Premium";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,212,170,0.9);color:white;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}

/* WhatsApp float */
.wa-float{position:fixed;bottom:24px;right:20px;width:54px;height:54px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(37,211,102,0.4);cursor:pointer;z-index:999;text-decoration:none;transition:transform 0.2s;}
.wa-float:hover{transform:scale(1.1);}
.wa-float svg{width:28px;height:28px;fill:white;}

/* Tooltip flags */
.flag-btn{cursor:pointer;border:none;background:none;font-size:22px;padding:4px;border-radius:6px;transition:transform 0.15s;}
.flag-btn:hover{transform:scale(1.2);}
.flag-btn.active{outline:2px solid var(--accent);border-radius:6px;}

/* Responsive */
@media(max-width:520px){
  .cv-creatif{grid-template-columns:1fr;}
  .cv-creatif .sidebar{min-height:auto;}
}

@media print{
  body{background:white!important;}
  .wa-float,.no-print{display:none!important;}
  .cv-preview{box-shadow:none!important;border-radius:0!important;padding:0!important;}
}

/* Loading spinner */
.spinner{width:22px;height:22px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}

/* Country search dropdown */
.country-dropdown{position:absolute;top:100%;left:0;right:0;background:#1e3a5f;border:1px solid var(--border);border-radius:10px;max-height:200px;overflow-y:auto;z-index:50;margin-top:2px;}
.country-option{padding:10px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;}
.country-option:hover{background:rgba(0,212,170,0.15);}

function generateCode(prenom,nom,poste){
  const seed=(prenom+nom+poste).toLowerCase().replace(/\s/g,"");
  let hash=0;
  for(let i=0;i<seed.length;i++){hash=(hash<<5)-hash+seed.charCodeAt(i);hash|=0;}
  return String(Math.abs(hash)).slice(0,6).padStart(6,"1");
}

function formatExp(text,style="bullet"){
  if(!text) return style==="premium"?`<li>À compléter / To be filled</li>`:`<li>À compléter</li>`;
  const lines=text.split("\n").filter(l=>l.trim().length>0);
  let html="";
  lines.forEach(line=>{
    const t=line.trim();
    if(t.startsWith("-")){
      html+=`<li style="margin-bottom:4px;font-size:13px;color:#444">${t.slice(1).trim()}</li>`;
    } else {
      html+=`<li style="font-weight:700;margin-top:8px;font-size:14px">${t}</li>`;
    }
  });
  return html||`<li>À compléter</li>`;
}

function formatSkills(str){
  return (str||"").split(/[,;\n]/).filter(c=>c.trim().length>1).map(c=>`<li>${c.trim()}</li>`).join("")||`<li>${str||"—"}</li>`;
}

    const n=(c.name[lang]||c.name.fr).toLowerCase();
    return n.includes(search.toLowerCase());
  });
  useEffect(()=>{
    const handler=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",handler);

  },[]);
  return <div style={{marginBottom:14,position:"relative"}} ref={ref}>

      <span style={{marginLeft:"auto",fontSize:10,color:"#94a3b8"}}>▼</span>
    </div>
    {open&&<div className="country-dropdown">
      <div style={{padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search..." autoFocus

  const [adminPrenom,setAdminPrenom]=useState("");
  const [adminNom,setAdminNom]=useState("");
  const [adminPoste,setAdminPoste]=useState("");
  const [adminCode,setAdminCode]=useState("");
  const [step,setStep]=useState(0);
  const [form,setForm]=useState(()=>{try{const s=localStorage.getItem("cvpro_form_v2");return s?JSON.parse(s):FORM_INIT;}catch{return FORM_INIT;}});

  const [isPaid,setIsPaid]=useState(false);

  const country=getCountry(form.countryCode);

  useEffect(()=>{try{localStorage.setItem("cvpro_lang",lang);}catch{}},[lang]);

    if(adminPwd===ADMIN_HASH){setAdminUnlocked(true);setAdminPwd("");}
    else alert("Incorrect password.");

    if(!adminPrenom||!adminNom||!adminPoste){alert("Fill all fields.");return;}
    setAdminCode(generateCode(adminPrenom,adminNom,adminPoste));

  const ok=()=>{
    if(step===0)return form.prenom&&form.nom&&form.poste&&form.countryCode;
    if(step===1)return form.experience.length>5;

  const isFreePlan=form.modele==="gratuit";

        (m,p)=>m.replace(p,`<span class="blur-zone">${p}</span>`));

        <div style={{background:"rgba(255,255,255,0.06)",borderRadius:99,height:4,overflow:"hidden"}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,#00d4aa,#0096c7)",width:`${pct}%`,transition:"width 0.4s ease",borderRadius:99}}/>
        </div>
      </div>

      <div style={C.card} className="fade">

        {/* STEP 0 - Personal */}
        {step===0&&<div>
          <div style={{fontSize:13,color:"#00d4aa",fontWeight:700,marginBottom:16,textTransform:"uppercase",letterSpacing:1}}>{t.steps[0]}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label={t.labels.firstName} value={form.prenom} onChange={v=>up("prenom",v)} placeholder="Jean"/>
            <Field label={t.labels.lastName} value={form.nom} onChange={v=>up("nom",v)} placeholder="DUPONT"/>
          </div>
          <Field label={t.labels.email} value={form.email} onChange={v=>up("email",v)} placeholder="jean@email.com" type="email"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <CountryPicker value={form.countryCode} onChange={v=>up("countryCode",v)} lang={lang}/>
            <Field label={t.labels.city} value={form.ville} onChange={v=>up("ville",v)} placeholder="Libreville, Paris, Dakar..."/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:8,alignItems:"end"}}>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>{t.labels.phone}</div>
              <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"11px 12px",color:"#94a3b8",fontSize:13,whiteSpace:"nowrap"}}>
                {country.flag} {country.phone}
              </div>
            </div>
            <Field label="&nbsp;" value={form.telephone} onChange={v=>up("telephone",v)} placeholder="06 12 34 56" type="tel"/>
          </div>
          <Field label={t.labels.jobTitle} value={form.poste} onChange={v=>up("poste",v)} placeholder="Chef de projet, Ingénieur, Manager..."/>
          <SelectField label={t.labels.sector} value={form.secteur} onChange={v=>up("secteur",v)} options={t.sectors}/>
          <Field label={t.labels.company} value={form.entreprise} onChange={v=>up("entreprise",v)} placeholder="Entreprise actuelle..."/>
        </div>}

        {/* STEP 1 - Experience */}
        {step===1&&<div>
          <div style={{fontSize:13,color:"#00d4aa",fontWeight:700,marginBottom:16,textTransform:"uppercase",letterSpacing:1}}>{t.steps[1]}</div>
          <Textarea label={t.labels.experience} value={form.experience} onChange={v=>up("experience",v)} placeholder={t.labels.expHint} rows={7}/>
          <Textarea label={t.labels.skills} value={form.competences} onChange={v=>up("competences",v)} placeholder={lang==="en"?"Python, Leadership, Project Management, Excel...":"Python, Leadership, Gestion de projet, Excel..."} rows={3}/>
          <Field label={t.labels.languages} value={form.langues} onChange={v=>up("langues",v)} placeholder={lang==="en"?"French (C2), English (C1), Spanish (B2)":"Français (C2), Anglais (C1), Espagnol (B2)"}/>
        </div>}

        {/* STEP 2 - Education */}
        {step===2&&<div>
          <div style={{fontSize:13,color:"#00d4aa",fontWeight:700,marginBottom:16,textTransform:"uppercase",letterSpacing:1}}>{t.steps[2]}</div>
          <SelectField label={t.labels.level} value={form.niveau} onChange={v=>up("niveau",v)} options={t.levels}/>
          <Field label={t.labels.field} value={form.formation} onChange={v=>up("formation",v)} placeholder={lang==="en"?"Computer Science, Business, Law, Medicine...":"Informatique, Gestion, Droit, Médecine..."}/>
          <Field label={t.labels.school} value={form.etablissement} onChange={v=>up("etablissement",v)} placeholder={lang==="en"?"University / School name":"Nom de l'université / école"}/>
        </div>}

        {/* STEP 3 - Document */}
        {step===3&&<div>
          <div style={{fontSize:13,color:"#00d4aa",fontWeight:700,marginBottom:16,textTransform:"uppercase",letterSpacing:1}}>{t.steps[3]}</div>
          
          {/* Plan selector */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[
              {id:"gratuit",icon:"📋",label:t.planFree,desc:t.planFreeDesc,free:true},
              {id:"premium",icon:"👑",label:t.planPremium,desc:t.planPremiumDesc,free:false},
            ].map(p=>{
              const isFreeSelected=isFreePlan;
              const sel=p.id==="gratuit"?isFreeSelected:!isFreeSelected;
              return <button key={p.id} onClick={()=>up("modele",p.id==="gratuit"?"gratuit":"moderne")}
                style={{padding:"12px 10px",border:`2px solid ${sel?"#00d4aa":"rgba(255,255,255,0.08)"}`,borderRadius:12,cursor:"pointer",background:sel?"rgba(0,212,170,0.08)":"rgba(255,255,255,0.03)",textAlign:"left",transition:"all 0.2s"}}>
                <div style={{fontSize:18,marginBottom:4}}>{p.icon}</div>
                <div style={{fontSize:12,fontWeight:700,color:sel?"#00d4aa":"#e2e8f0",marginBottom:2}}>{p.label}</div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{p.desc}</div>
              </button>;
            })}
          </div>

          {/* Model picker (premium only) */}
          {!isFreePlan&&<div>
            <div style={{fontSize:11,color:"#94a3b8",marginBottom:10,fontWeight:600,textTransform:"uppercase"}}>{t.labels.model}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:6}}>
              {[{id:"moderne",label:t.models.moderne},{id:"creatif",label:t.models.creatif},{id:"elite",label:t.models.elite},{id:"minimal",label:t.models.minimal}].map(m=>(
                <ModelCard key={m.id} id={m.id} label={m.label} desc={(t.modelDescs||{})[m.id]||""} selected={form.modele===m.id} onClick={()=>up("modele",m.id)} free={false} t={t}/>
              ))}
            </div>
            <p style={{color:"#475569",fontSize:11,textAlign:"center",marginBottom:12}}>{t.selectModel}</p>
          </div>}

          {/* Doc type (premium) */}
          {!isFreePlan&&<div style={{background:"rgba(0,212,170,0.05)",border:"1px solid rgba(0,212,170,0.12)",borderRadius:12,padding:14}}>
            <div style={{fontSize:11,color:"#00d4aa",marginBottom:10,fontWeight:600,textTransform:"uppercase"}}>{t.labels.docType}</div>
            {t.docTypes.map(d=><button key={d.id} onClick={()=>up("typeDoc",d.id)}
              style={{display:"block",width:"100%",padding:"10px 14px",marginBottom:6,background:form.typeDoc===d.id?"rgba(0,212,170,0.15)":"transparent",border:`1px solid ${form.typeDoc===d.id?"rgba(0,212,170,0.35)":"rgba(255,255,255,0.07)"}`,borderRadius:10,cursor:"pointer",color:form.typeDoc===d.id?"#00d4aa":"#94a3b8",textAlign:"left",fontSize:13,fontWeight:form.typeDoc===d.id?600:400}}>
              {d.l}
            </button>)}
          </div>}
        </div>}
      </div>

      <div style={{display:"flex",gap:10}}>
        {step>0&&<button onClick={()=>setStep(s=>s-1)} style={C.btnS}>{t.btn.back}</button>}
        {step<t.steps.length-1
          ?<button onClick={()=>setStep(s=>s+1)} disabled={!ok()} style={{...C.btnP,opacity:ok()?1:0.4,cursor:ok()?"pointer":"not-allowed"}}>{t.btn.next}</button>
          :<div style={{flex:1,display:"flex",flexDirection:"column",gap:10}}>
            {isFreePlan
              ?<button onClick={()=>genDoc(false)} style={C.btnP}>{t.btn.generate}</button>
              :<>
                <button onClick={()=>genDoc("preview")} style={{...C.btnP,background:"rgba(0,212,170,0.1)",border:"2px solid rgba(0,212,170,0.4)",color:"#00d4aa"}}>{t.btn.preview}</button>
                <button onClick={()=>setShowPayModal(true)} style={C.btnGold}>{t.btn.pay} — {country.price} {country.currency}</button>
              </>
            }
          </div>
        }
      </div>
      <p style={{color:"#475569",fontSize:11,textAlign:"center",marginTop:12}}>{t.autoSave}</p>
    </div>

    {/* Admin Modal */}
    {showAdminModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
      <div style={{background:"#112240",borderRadius:18,padding:26,maxWidth:340,width:"100%",border:"1px solid rgba(255,255,255,0.1)"}}>
        <h3 style={{marginBottom:16,fontSize:16}}>🔧 Admin Panel</h3>
        {!adminUnlocked?<>
          <input type="password" value={adminPwd} onChange={e=>setAdminPwd(e.target.value)} placeholder="Password"
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"11px 14px",color:"#e2e8f0",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:10}}
            onKeyDown={e=>e.key==="Enter"&&checkAdminPwd()}/>
          <button onClick={checkAdminPwd} style={{...C.btnP,marginBottom:8}}>Unlock</button>
        </>:<>
          <Field label="First Name" value={adminPrenom} onChange={setAdminPrenom} placeholder="Jean"/>
          <Field label="Last Name" value={adminNom} onChange={setAdminNom} placeholder="DUPONT"/>
          <Field label="Job Title" value={adminPoste} onChange={setAdminPoste} placeholder="Manager"/>
          <button onClick={genAdminCode} style={{...C.btnP,marginBottom:10}}>Generate Code</button>
          {adminCode&&<div style={{textAlign:"center",padding:"14px",background:"rgba(0,212,170,0.1)",borderRadius:12,fontSize:28,fontWeight:900,letterSpacing:8,color:"#00d4aa",marginBottom:8}}>{adminCode}</div>}
        </>}
        <button onClick={()=>{setShowAdminModal(false);setAdminUnlocked(false);setAdminCode("");}} style={{...C.btnS,width:"100%",textAlign:"center",fontSize:13}}>Close</button>
      </div>
    </div>}

    {/* Pay Modal from form */}
    {showPayModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
      <div style={{background:"#112240",borderRadius:20,padding:28,maxWidth:380,width:"100%",border:"1px solid rgba(255,255,255,0.1)"}}>
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:36,marginBottom:6}}>📱</div>
          <h2 style={{fontSize:17,marginBottom:4}}>{t.payModal.title}</h2>
        </div>
        <div style={{background:"rgba(0,212,170,0.07)",border:"1px solid rgba(0,212,170,0.18)",borderRadius:12,padding:16,marginBottom:16}}>
          <p style={{color:"#e2e8f0",fontSize:13,fontWeight:700,marginBottom:10}}>{t.payModal.steps}</p>
          <p style={{color:"#94a3b8",fontSize:13,marginBottom:10}}>
            <strong style={{color:"#00d4aa"}}>1.</strong> {t.payModal.step1.replace("{price}",`${country.price} ${country.currency}`)}
          </p>
          <div style={{background:"rgba(0,212,170,0.1)",borderRadius:10,padding:"10px 14px",marginBottom:10,textAlign:"center"}}>
            <p style={{color:"#00d4aa",fontWeight:700,fontSize:12,marginBottom:2}}>{country.payLabel}</p>
            <p style={{color:"#e2e8f0",fontWeight:700,fontSize:16}}>+241 62 16 97 12</p>
          </div>
          <p style={{color:"#94a3b8",fontSize:12,marginBottom:6}}><strong style={{color:"#00d4aa"}}>2.</strong> {t.payModal.step2} <strong>+241 62 16 97 12</strong></p>
          <p style={{color:"#94a3b8",fontSize:12}}><strong style={{color:"#00d4aa"}}>3.</strong> {t.payModal.step3}</p>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>{t.payModal.codeLabel}</div>
          <input type="number" value={codeInput} onChange={e=>setCodeInput(e.target.value.slice(0,6))}
            placeholder="123456" maxLength={6}
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:13,color:"#e2e8f0",fontSize:20,outline:"none",boxSizing:"border-box",textAlign:"center",letterSpacing:6,fontWeight:700}}/>
          {codeError&&<p style={{color:"#fca5a5",fontSize:12,marginTop:6}}>{codeError}</p>}
        </div>
        <button onClick={verifyCode} style={{...C.btnP,marginBottom:8}}>{t.btn.validate}</button>
        <button onClick={()=>{setShowPayModal(false);setCodeInput("");setCodeError("");}} style={{...C.btnS,width:"100%",textAlign:"center",fontSize:13}}>{t.btn.cancel}</button>
      </div>
    </div>}
  </div>;

  // ===== HOME PAGE =====
  return <div style={C.root}>
    <div style={C.hdr}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={C.logo} onClick={handleLogoTap}>✨</div>
        <div>
          <div style={{fontWeight:700,fontSize:16}}>{t.appName}</div>
          <div style={{fontSize:10,color:"#00d4aa"}}>{t.tagline}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {LANGS.map(l=><button key={l} className={`flag-btn ${lang===l?"active":""}`} onClick={()=>setLang(l)} title={l.toUpperCase()}>{LANG_FLAGS[l]}</button>)}
      </div>
    </div>

    <div style={C.wrap}>
      {/* Hero */}
      <div style={{textAlign:"center",padding:"44px 0 28px"}} className="fade">
        <div style={{fontSize:56,marginBottom:14}}>🌍</div>
        <h1 style={{fontSize:26,fontWeight:900,lineHeight:1.25,marginBottom:12,letterSpacing:"-0.5px"}}>
          {t.hero.split("\n").map((line,i)=><span key={i}>{i===0?line:<><br/><span style={{color:"#00d4aa"}}>{line}</span></>}</span>)}
        </h1>
        <p style={{color:"#94a3b8",fontSize:14,marginBottom:10,lineHeight:1.6}}>
          {t.heroSub.replace("{n}","50")}
        </p>
        <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:22}}>
          {["🇬🇦","🇨🇲","🇸🇳","🇫🇷","🇨🇦","🇩🇪","🇧🇷","🇬🇧","🇲🇦","🇳🇬"].map(f=><span key={f} style={{fontSize:22}}>{f}</span>)}
        </div>
        <p style={{color:"#64748b",fontSize:12,marginBottom:20}}>+{getCount()} {t.cvCount} 🌍</p>
        <button onClick={()=>setPage("form")} className="pulse-btn" style={{...C.btnP,fontSize:17,padding:"16px 32px",width:"auto",display:"inline-block",borderRadius:14}}>
          {t.cta}
        </button>
        <p style={{color:"#475569",fontSize:11,marginTop:10}}>{t.ctaSub}</p>
      </div>

      {/* Plans */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:28}}>
        <div style={{...C.card,marginBottom:0,border:"1px solid rgba(255,255,255,0.08)"}}>
          <div style={{fontSize:22,marginBottom:8}}>📋</div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{t.planFree}</div>
          <div style={{color:"#94a3b8",fontSize:12,marginBottom:10}}>{t.planFreeDesc}</div>
          <div style={{color:"#00d4aa",fontSize:18,fontWeight:800}}>{t.free}</div>
        </div>
        <div style={{...C.card,marginBottom:0,border:"1px solid rgba(245,158,11,0.3)",background:"rgba(245,158,11,0.05)"}}>
          <div style={{fontSize:22,marginBottom:8}}>👑</div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4,color:"#f59e0b"}}>{t.planPremium}</div>
          <div style={{color:"#94a3b8",fontSize:12,marginBottom:10}}>{t.planPremiumDesc}</div>
          <div style={{color:"#f59e0b",fontSize:16,fontWeight:800}}>
            {COUNTRIES.find(c=>c.code==="GA")?.price} FCFA+
          </div>
        </div>
      </div>

      {/* Features */}
      <div style={C.card}>
        <div style={{fontSize:13,color:"#00d4aa",fontWeight:700,marginBottom:14,textTransform:"uppercase",letterSpacing:1}}>✨ Features</div>
        {[
          ["🌍","50+ countries supported","Supports 50+ pays"],
          ["🌐","4 languages (FR/EN/ES/PT)","4 langues (FR/EN/ES/PT)"],
          ["📄","5 professional templates","5 modèles professionnels"],
          ["✉️","Cover letter included","Lettre de motivation incluse"],
          ["⬇️","High quality PDF export","Export PDF haute qualité"],
          ["💾","Auto-save","Sauvegarde automatique"],
        ].map(([icon,en,fr])=><div key={en} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,fontSize:13}}>
          <span style={{fontSize:16}}>{icon}</span>
          <span style={{color:"#94a3b8"}}>{lang==="en"?en:fr}</span>
        </div>)}
      </div>

      <button onClick={()=>setPage("form")} style={{...C.btnP,fontSize:16,padding:"15px"}}>
        {t.cta}
      </button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
